version: '3.9'

services:
  nginx:
    image: nginx:1.26-alpine
    container_name: yii2_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - yii2-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: yii2_php
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - yii2-network

  mysql:
    image: mysql:8.0.36
    container_name: yii2_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_logs
      MYSQL_USER: localhost
      MYSQL_PASSWORD: localhost
    ports:
      - "3344:3306"
    volumes:
      - ./docker/mysql/mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - yii2-network

volumes:
  mysql_data:

networks:
  yii2-network:
    driver: bridge
